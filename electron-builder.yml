appId: "com.velo.downloader"
productName: "Velo"
directories:
  output: "dist"
  buildResources: "resources"
files:
  - ".next/**/*"
  - "electron/**/*"
  - "package.json"
  - "public/**/*"
extraResources:
  - from: "resources/bin"
    to: "bin"
    filter:
      - "**/*"

win:
  target:
    - target: "nsis"
      arch:
        - "x64"
  icon: "resources/icon.png"
  artifactName: "Velo-Setup-${version}.${ext}"

mac:
  target:
    - target: "dmg"
      arch:
        - "x64"
        - "arm64"
  category: "public.app-category.utilities"
  icon: "resources/icon.png"
  artifactName: "Velo-${version}-${arch}.${ext}"

dmg:
  title: "Velo ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
